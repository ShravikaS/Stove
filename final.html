<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Final</title>
	<style>
		:root {
			--bg: #1f140d;
			--card: #f7efe3;
			--text: #3a2010;
			--accent: #1a5e32;
			--accent-hover: #145228;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			display: grid;
			place-items: center;
			background: radial-gradient(circle at top, #5b3922 0%, var(--bg) 55%);
			font-family: Arial, sans-serif;
			color: var(--text);
		}

		.card {
			width: min(92vw, 900px);
			background: rgba(247, 239, 227, 0.96);
			border: 4px solid rgba(58, 32, 16, 0.18);
			border-radius: 28px;
			padding: 28px;
			box-shadow: 0 18px 60px rgba(0, 0, 0, 0.28);
			text-align: center;
		}

		h1 {
			margin: 0 0 16px;
			font-size: clamp(2rem, 4vw, 3.4rem);
		}

		img {
			width: min(100%, 780px);
			height: auto;
			display: block;
			margin: 0 auto 20px;
			border-radius: 18px;
		}

		button {
			appearance: none;
			border: 0;
			border-radius: 999px;
			padding: 14px 30px;
			font-size: 1.2rem;
			font-weight: 700;
			color: #fdf7e7;
			background: var(--accent);
			cursor: pointer;
			transition: transform 0.15s ease, background-color 0.2s ease;
		}

		button:hover {
			background: var(--accent-hover);
			transform: translateY(-1px);
		}

		#message {
			min-height: 2.2em;
			margin-top: 16px;
			font-size: 1.4rem;
			font-weight: 700;
		}
	</style>
</head>
<body>
	<main class="card">
		<h1>Final</h1>
		<img src="Stove CS Project (1).png" alt="Stove CS Project image">
		<button id="yippee-button" type="button">Yippee!</button>
		<div id="message" aria-live="polite"></div>
	</main>

	<script>
		const button = document.getElementById('yippee-button');
		const message = document.getElementById('message');

		button.addEventListener('click', () => {
			message.textContent = 'Yippee!';
		});
	</script>
	<script src="music.js"></script>
</body>
</html>
