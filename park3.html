<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Park</title>
    <link rel="stylesheet" href="style2.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
</head>
<body>
    <img class="park-bg" src="park.png" alt="park">
    <img id="player-animal" src="" alt="your animal">

    <!-- Tardigrade with first quest bubble -->
    <div id="tardii-container">
        <div id="speech-bubble">
            <p>Oops! You already completed this quest!</p>
            
        </div>
        <img id="tardii" src="tardii.png" alt="tardigrade">
    </div>

    <!-- Monkey with second quest bubble -->
    <div id="monkey-container">
        <div id="monkey-bubble">
            <p>Oops! You already completed this quest!</p>
    
        </div>
        <img id="monkey" src="monkey.png" alt="monkey">
    </div>
    <div id="penguin-container">
        <div id="penguin-bubble">
            <p>YUM! Thanks for those fish. Here is your third quest!</p>
            <button onclick="window.location.href='maze.html'">Start</button>
        </div>
        <img id="penguin" src="pen.png" alt="penguin">
    </div>

   

    <script>
        const animal = localStorage.getItem('selectedAnimal');
        const name = localStorage.getItem('selectedAnimalName');
        const playerImg = document.getElementById('player-animal');

        if (animal) {
            playerImg.src = animal;
            playerImg.alt = name;
        }

        let x = 62;
        let y = 8;

        function checkProximity() {
            const playerRect = playerImg.getBoundingClientRect();
            const pCX = playerRect.left + playerRect.width / 2;
            const pCY = playerRect.top + playerRect.height / 2;

            // Tardii bubble
            const tardiiRect = document.getElementById('tardii').getBoundingClientRect();
            const tCX = tardiiRect.left + tardiiRect.width / 2;
            const tCY = tardiiRect.top + tardiiRect.height / 2;
            const tardiiDist = Math.hypot(pCX - tCX, pCY - tCY);
            document.getElementById('speech-bubble').style.display = tardiiDist < 200 ? 'block' : 'none';

            // Monkey bubble
            const monkeyRect = document.getElementById('monkey').getBoundingClientRect();
            const mCX = monkeyRect.left + monkeyRect.width / 2;
            const mCY = monkeyRect.top + monkeyRect.height / 2;
            const monkeyDist = Math.hypot(pCX - mCX, pCY - mCY);
            document.getElementById('monkey-bubble').style.display = monkeyDist < 200 ? 'block' : 'none';

            // Turtle collision push player back only if a turtle exists on this page
            const turtle = document.getElementById('turtle');
            let turtleDist = Infinity;
            let tuCX = 0;
            let tuCY = 0;

            if (turtle) {
                const turtleRect = turtle.getBoundingClientRect();
                tuCX = turtleRect.left + turtleRect.width / 2;
                tuCY = turtleRect.top + turtleRect.height / 2;
                turtleDist = Math.hypot(pCX - tuCX, pCY - tuCY);
            }

            const penguinRect = document.getElementById('penguin').getBoundingClientRect();
            const aCX = penguinRect.left + penguinRect.width / 2;
            const aCY = penguinRect.top + penguinRect.height / 2;
            const penguinDist = Math.hypot(pCX - aCX, pCY - aCY);
            document.getElementById('penguin-bubble').style.display = penguinDist < 200 ? 'block' : 'none';


            if (turtleDist < 100) {
                // bounce back
                if (pCX < tuCX) x -= 3; else x += 3;
                if (pCY < tuCY) y += 3; else y -= 3;
                playerImg.style.left = x + '%';
                playerImg.style.bottom = y + '%';
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft')  x -= 1;
            if (e.key === 'ArrowRight') x += 1;
            if (e.key === 'ArrowUp')    y += 1;
            if (e.key === 'ArrowDown')  y -= 1;

            playerImg.style.left = x + '%';
            playerImg.style.bottom = y + '%';

            checkProximity();
        });
    </script>
    <script src="music.js"></script>
</body>
</html>
